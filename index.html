<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Downloads</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4;
      --text: #171717;
      --muted: #62645f;
      --button: #115e59;
      --button-alt: #334155;
      --button-text: #ffffff;
      --line: #d8d8d2;
      --card: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101211;
        --text: #f2f4f0;
        --muted: #a9ada6;
        --button: #2dd4bf;
        --button-alt: #94a3b8;
        --button-text: #06201d;
        --line: #2d302e;
        --card: #181b19;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
      display: grid;
      gap: 22px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.5rem);
      line-height: 0.95;
      font-weight: 760;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .apps {
      display: grid;
      gap: 14px;
      text-align: left;
    }

    .app {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
    }

    .app h2 {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.2;
    }

    .app p {
      font-size: 0.95rem;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    a {
      display: inline-flex;
      min-height: 56px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 0 24px;
      background: var(--button);
      color: var(--button-text);
      font-size: 1rem;
      font-weight: 720;
      text-decoration: none;
      box-shadow: 0 12px 28px rgb(0 0 0 / 14%);
    }

    .secondary {
      background: var(--button-alt);
    }

    a:focus-visible {
      outline: 3px solid var(--text);
      outline-offset: 4px;
    }

    .meta {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>App Downloads</h1>
    <p>Download the latest available APKs.</p>
    <section class="apps" aria-label="Available apps">
      <article class="app">
        <div>
          <h2>JPWNetwork</h2>
          <p class="meta">Version V7</p>
        </div>
        <div class="actions">
          <a href="app.apk" download>Download JPWNetwork</a>
        </div>
      </article>
      <article class="app">
        <div>
          <h2>mHere Pro</h2>
          <p class="meta">Version V1</p>
        </div>
        <div class="actions">
          <a class="secondary" href="mhere-pro.apk" download>Download mHere Pro</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
